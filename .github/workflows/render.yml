name: Render Cube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_path: letters/1_A.png
            image_name: 1_A
          - image_path: letters/2_R.png
            image_name: 2_R
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Blender and system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y blender

      - name: Install bpy and project dependencies
        run: |
          pip install --upgrade pip
          pip install bpy

      - name: Render preview for ${{ matrix.image_name }}
        run: |
          python -m arkiv_cube_3d render --image "${{ matrix.image_path }}"
          mv orange_cube.png "${{ matrix.image_name }}_preview.png"
          mv orange_cube.blend "${{ matrix.image_name }}_preview.blend"

      - name: Add ${{ matrix.image_name }} preview to job summary
        if: ${{ hashFiles(format('{0}_preview.png', matrix.image_name)) != '' }}
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          image_name = os.environ["IMAGE_NAME"]
          image_path = Path(f"{image_name}_preview.png")
          encoded = base64.b64encode(image_path.read_bytes()).decode("ascii")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write(f"## Preview render for `{image_name}`\n\n")
              summary.write(
                  f'<img alt="Preview render for {image_name}" src="data:image/png;base64,{encoded}" width="400" />\n\n'
              )
              summary.write(
                  f"The `{image_name}_preview.png` and `{image_name}_preview.blend` files remain available "
                  f"in the `letters-{image_name}` artifact.\n"
              )
          PY
        env:
          IMAGE_NAME: ${{ matrix.image_name }}

      - name: Render full image for ${{ matrix.image_name }}
        run: |
          python -m arkiv_cube_3d render --image "${{ matrix.image_path }}" --full
          mv orange_cube.png "${{ matrix.image_name }}_full.png"
          mv orange_cube.blend "${{ matrix.image_name }}_full.blend"

      - name: Upload rendered outputs for ${{ matrix.image_name }}
        uses: actions/upload-artifact@v4
        with:
          name: letters-${{ matrix.image_name }}
          path: |
            ${{ matrix.image_name }}_preview.png
            ${{ matrix.image_name }}_preview.blend
            ${{ matrix.image_name }}_full.png
            ${{ matrix.image_name }}_full.blend
