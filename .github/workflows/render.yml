name: Render Cube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Blender and system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y blender

      - name: Install bpy and project dependencies
        run: |
          pip install --upgrade pip
          pip install bpy

      - name: Render the cube
        run: |
          python -m arkiv_cube_3d render

      - name: Add render preview to job summary
        if: ${{ hashFiles('orange_cube.png') != '' }}
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          image_path = Path("orange_cube.png")
          encoded = base64.b64encode(image_path.read_bytes()).decode("ascii")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("## Fast render preview\n\n")
              summary.write(
                  '<img alt="Fast render preview" src="data:image/png;base64,'
                  f'{encoded}" width="400" />\n\n'
              )
              summary.write(
                  "The full `orange_cube.png` and `orange_cube.blend` files remain available "
                  "in the `orange-cube-render` artifact.\n"
              )
          PY

      - name: Upload rendered outputs
        uses: actions/upload-artifact@v4
        with:
          name: orange-cube-render
          path: |
            orange_cube.png
            orange_cube.blend
