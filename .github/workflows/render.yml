name: Render Cube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Blender and system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y blender

      - name: Install bpy and project dependencies
        run: |
          pip install --upgrade pip
          pip install bpy

      - name: Render the cube
        run: |
          python -m arkiv_cube_3d render --full

      - name: Upload rendered outputs
        uses: actions/upload-artifact@v4
        with:
          name: orange-cube-render
          path: |
            orange_cube.png
            orange_cube.blend
